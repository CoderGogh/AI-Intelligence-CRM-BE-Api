spring:
  application:
    name: crm

  # 기본 활성 프로파일: local
  # 배포 시 환경변수로 오버라이드: SPRING_PROFILES_ACTIVE=prod
  profiles:
    active: local

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    validate-on-migrate: true
    clean-disabled: true

  jpa:
    hibernate:
      ddl-auto: validate

  task:
    scheduling:
      pool:
        size: 3

server:
  port: 8080
  servlet:
    context-path: /api

jwt:
  access-token-expire-ms: 3600000
  refresh-token-expire-ms: 604800000

app:
  cookie:
    secure: false
    same-site: Lax