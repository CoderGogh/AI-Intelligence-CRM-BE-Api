spring:
  application:
    name: crm

  datasource:
    url: jdbc:mysql://localhost:13306/crm?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: crm
    password: crm

  data:
    mongodb:
      uri: mongodb://localhost:27018/crm

  redis:
    host: localhost
    port: 6380

  elasticsearch:
    uris: http://localhost:9201

  kafka:
    bootstrap-servers: localhost:29092
    consumer:
      group-id: crm-group
      auto-offset-reset: earliest
    producer:
      acks: all

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true
    clean-disabled: true

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080

logging:
  level:
    org.flywaydb: DEBUG
    org.springframework.jdbc: DEBUG
    com.zaxxer.hikari: DEBUG