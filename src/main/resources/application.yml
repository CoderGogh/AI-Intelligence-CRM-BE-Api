spring:
  application:
    name: crm

  datasource:
    url: jdbc:mysql://localhost:13306/crm?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: crm
    password: crm

  data:
    mongodb:
      uri: mongodb://localhost:27018/crm

  redis:
    host: localhost
    port: 6380

  elasticsearch:
    uris: http://localhost:9201

  kafka:
    bootstrap-servers: localhost:29092
    consumer:
      group-id: crm-group
      auto-offset-reset: earliest
    producer:
      acks: all

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    validate-on-migrate: true
    clean-disabled: true

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080

logging:
  level:
    org.flywaydb: DEBUG
    org.springframework.jdbc: DEBUG
    com.zaxxer.hikari: DEBUG

# Google OAuth 추가
# Client ID/Secret은 환경변수로 관리
# Run/Debug Configurations → Environment Variables에 추가
# GOOGLE_CLIENT_ID=발급받은_클라이언트_ID
# GOOGLE_CLIENT_SECRET=발급받은_클라이언트_시크릿
google:
  oauth:
    client-id: ${GOOGLE_CLIENT_ID}
    client-secret: ${GOOGLE_CLIENT_SECRET}


# JWT 의존성 추가
# 환경변수에 아래처럼 추가 필요
# JWT_SECRET=32자_이상의_랜덤_문자열_예시_ureca4crmprojectsecretkey!!
jwt:
  secret: ${JWT_SECRET}
  access-token-expire-ms: 3600000    # 1시간(값 조정 가능)
  refresh-token-expire-ms: 604800000  # 7일(값 조정 가능)