spring:
  application:
    name: crm-test

  datasource:
    url: jdbc:mysql://localhost:13306/crm?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: crm
    password: crm

  data:
    mongodb:
      uri: mongodb://localhost:27018/crm

  redis:
    host: localhost
    port: 6380

  elasticsearch:
    uris: http://localhost:9201

  kafka:
    bootstrap-servers: localhost:29092
    consumer:
      group-id: crm-group
      auto-offset-reset: earliest
    producer:
      acks: all

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true
    clean-disabled: true

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

server:
  port: 8080

google:
  oauth:
    client-id: test-client-id
    client-secret: test-client-secret

jwt:
  secret: test-jwt-secret-key-for-testing-purposes-32chars
  access-token-expire-ms: 3600000
  refresh-token-expire-ms: 604800000
